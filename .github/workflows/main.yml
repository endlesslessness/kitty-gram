name: Kittygram Telegram Notifications

on:
  push:
    branches: [ main ]

env:
  DOCKER_USERNAME: endlesslessness

jobs:
  build_and_push:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/kittygram_backend:latest
    
    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/kittygram_frontend:latest
    
    - name: Build and push gateway
      uses: docker/build-push-action@v5
      with:
        context: ./nginx
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/kittygram_gateway:latest

  send_telegram_notification:
    name: Send Telegram notification
    runs-on: ubuntu-latest
    needs: build_and_push
    
    steps:
    - name: Send message
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🐱 Kittygram
          
          ✅ Новые образы загружены на Docker Hub!
          📦 Ветка: ${{ github.ref_name }}
          💾 Коммит: ${{ github.sha }}
          👤 Автор: ${{ github.actor }}