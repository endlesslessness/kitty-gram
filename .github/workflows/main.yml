name: Kittygram CI/CD

on:
  push:
    branches: [ main ]

env:
  DOCKER_USERNAME: endlesslessness

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install ruff pytest
        pip install -r requirements.txt
    
    - name: Lint with ruff
      run: |
        cd backend
        ruff check .
    
    - name: Run backend tests
      run: |
        cd backend
        pytest

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Run frontend tests
      run: |
        cd frontend
        npm test -- --watchAll=false

  build_and_push:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    needs: tests
    if: success()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push backend
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/kittygram_backend:latest
    
    - name: Build and push frontend
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/kittygram_frontend:latest
    
    - name: Build and push gateway
      uses: docker/build-push-action@v4
      with:
        context: ./nginx
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/kittygram_gateway:latest

  send_telegram_notification:
    name: Send Telegram notification
    runs-on: ubuntu-latest
    needs: build_and_push
    if: always()
    
    steps:
    - name: Send message
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          ✅ Kittygram Workflow завершен!
          Статус: ${{ job.status }}
          Репозиторий: ${{ github.repository }}
          Ветка: ${{ github.ref_name }}
          Коммит: ${{ github.sha }}