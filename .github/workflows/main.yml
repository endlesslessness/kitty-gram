name: Kittygram CI/CD

on:
  push:
    branches: [ main ]

env:
  DOCKER_USERNAME: endlesslessness

jobs:
  tests:
    name: Run tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install ruff pytest
        pip install -r requirements.txt
    
    - name: Lint with ruff
      run: |
        cd backend
        ruff check .
    
    - name: Run backend tests
      run: |
        cd backend
        pytest

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci
    
    - name: Run frontend tests
      run: |
        cd frontend
        npm test -- --watchAll=false

  build_and_push:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    needs: tests
    if: success()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/kittygram_backend:latest
    
    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/kittygram_frontend:latest
    
    - name: Build and push gateway
      uses: docker/build-push-action@v5
      with:
        context: ./nginx
        push: true
        tags: ${{ env.DOCKER_USERNAME }}/kittygram_gateway:latest

  send_telegram_notification:
    name: Send Telegram notification
    runs-on: ubuntu-latest
    needs: [tests, build_and_push]
    if: always()  # Отправляем при любом исходе
    
    steps:
    - name: Send message
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_TO }}
        token: ${{ secrets.TELEGRAM_TOKEN }}
        message: |
          🐱 Kittygram CI/CD
          
          📊 Статус тестов: ${{ needs.tests.result }}
          📦 Статус сборки: ${{ needs.build_and_push.result }}
          🌿 Ветка: ${{ github.ref_name }}
          💾 Коммит: ${{ github.sha }}
          👤 Автор: ${{ github.actor }}
          🕐 Время: ${{ github.event.head_commit.timestamp }}
          
          ${{ needs.build_and_push.result == 'success' && '✅ Образы загружены на Docker Hub!' || '❌ Что-то пошло не так...' }}